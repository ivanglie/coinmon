version: "2"

run:
  timeout: 5m

linters:
  disable-all: true
  enable:
    - revive
    - govet
    - unconvert
    - staticcheck
    - unused
    - gosec
    - dupl
    - misspell
    - unparam
    - ineffassign
    - gochecknoinits
    - gocritic
    - nakedret
    - prealloc
  settings:
    govet:
      enable:
        - shadow
    goconst:
      min-len: 2
      min-occurrences: 2
    misspell:
      locale: US
    lll:
      line-length: 140
    gocritic:
      enabled-tags:
        - performance
        - style
        - experimental
      disabled-checks:
        - wrapperFunc
        - hugeParam
        - rangeValCopy
        - singleCaseSwitch
        - ifElseChain

formatters:
  enable:
    - gofmt

issues:
  exclude-dirs:
    - vendor
  exclude-rules:
    - text: "at least one file in a package should have a package comment"
      linters:
        - stylecheck
    - text: "should have a package comment"
      linters:
        - revive
    - path: _test\.go
      linters:
        - gosec
        - dupl
  exclude-use-default: false
